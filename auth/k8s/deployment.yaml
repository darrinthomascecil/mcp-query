apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --provider=oidc
            - --oidc-issuer-url=$(OIDC_ISSUER_URL)
            - --client-id=$(CLIENT_ID)
            - --client-secret=$(CLIENT_SECRET)
            - --cookie-secret=$(COOKIE_SECRET)
            - --upstream=$(UPSTREAM)
            - --http-address=0.0.0.0:4180
            - --email-domain=*
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --set-xauthrequest=true
            - --pass-access-token=true
            - --pass-user-headers=true
            - --skip-provider-button=true
            - --silence-ping-logging=true
            - --oidc-email-claim=preferred_username
            - --user-id-claim=preferred_username
            - --allowed-group=$(ALLOWED_GROUP)
            - --custom-templates-dir=/templates
          env:
            - name: CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy
                  key: client-id
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy
                  key: client-secret
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy
                  key: cookie-secret
            - name: OIDC_ISSUER_URL
              valueFrom:
                configMapKeyRef:
                  name: oauth2-proxy-config
                  key: oidc-issuer-url
            - name: UPSTREAM
              valueFrom:
                configMapKeyRef:
                  name: oauth2-proxy-config
                  key: upstream
            - name: ALLOWED_GROUP
              valueFrom:
                configMapKeyRef:
                  name: oauth2-proxy-config
                  key: allowed-group
                  optional: true
          ports:
            - name: http
              containerPort: 4180
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: templates
              mountPath: /templates
      volumes:
        - name: templates
          configMap:
            name: oauth2-proxy-templates
