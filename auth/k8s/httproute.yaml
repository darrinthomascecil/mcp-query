# When auth is enabled, this route replaces client/k8s/httproute.yaml.
# Traffic flows: Gateway -> OAuth2 Proxy -> mcp-query app
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-query-route
spec:
  parentRefs:
    - name: local-gateway       # Your gateway name
      sectionName: wildcard-https
  hostnames:
    - query.local.test           # Your hostname
  rules:
    - backendRefs:
        - name: oauth2-proxy
          port: 80
