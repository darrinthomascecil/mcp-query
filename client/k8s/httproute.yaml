# Example HTTPRoute for Gateway API — customize for your environment
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-query-route
spec:
  parentRefs:
    - name: local-gateway
      sectionName: wildcard-https
  hostnames:
    - query.local.test
  rules:
    - backendRefs:
        - name: mcp-query
          port: 80
