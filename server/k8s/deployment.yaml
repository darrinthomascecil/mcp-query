apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-mcp
  namespace: aks-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aks-mcp
  template:
    metadata:
      labels:
        app: aks-mcp
    spec:
      serviceAccountName: aks-mcp
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: aks-mcp
          image: ghcr.io/azure/aks-mcp:latest
          args:
            - --transport
            - streamable-http
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --access-level
            - readwrite
            - --timeout
            - "600"
            - --log-level
            - info
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DISABLE_CACHE
              value: "false"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: azure-config
              mountPath: /home/mcp/.azure
      volumes:
        - name: tmp
          emptyDir: {}
        - name: azure-config
          emptyDir: {}
